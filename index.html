<!doctype html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DevClub Store</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&family=Orbitron:wght@400..900&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="styles.css">

</head>

<body>
  <header>
    <div class="logo">Death Note</div>
    <nav>
      <ul>
        <li>pesquisar</li>
        <li>home</li>
        <li>personagens</li>
        <li>fale conosco</li>
      </ul>
    </nav>
  </header>

  <main class="container">
    <div class="tech-circle">
      <div class="circle"></div>
      <div class="circle"></div>
      <div class="circle"></div>
      <div class="circle"></div>
    </div>

    <div class="list">

      <div class="item active">
        <div class="product-img">
          <img src="img/apple-watch.png" alt="Apple Watch">
        </div>
        <div class="content">
          <p class="product-tag">Novo lançamento</p>
          <p class="product-name">Apple watch series 10</p>
          <p class="description">top 10 relogios fodas e fodas dem</p>
          <button class="btn">Saiba mais</button>
        </div>
      </div>

      <div class="item">
        <div class="product-img">
          <img src="img/air-pods.png" alt="Air pods">
        </div>
        <div class="content">
          <p class="product-tag">Novo lançamento</p>
          <p class="product-name">Air Pods</p>
          <p class="product-description">dasdasdasdasdasd</p>
          <button class="btn">Saiba mais</button>
        </div>
      </div>

      <div class="item">
        <div class="product-img">
          <img src="img/vision-pro.png" alt="Vision Pro">
        </div>
        <div class="content">
          <p class="product-tag">Novo lançamento</p>
          <p class="product-name">Vision Pro</p>
          <p class="product-description">O óculos mais tecnológico do mercado</p>
          <button class="btn">Saiba mais</button>
        </div>
      </div>

    </div>


    </div>
    </div>

    <div class="arrows">
      <button class="arrow-btn" id="prev">
        <svg xmlns="http://www.w3.org/2000/svg" width="25" height="25" fill="#fff" class="bi bi-arrow-left-short"
          viewBox="0 0 16 16">
          <path fill-rule="evenodd"
            d="M12 8a.5.5 0 0 1-.5.5H5.707l2.147 2.146a.5.5 0 0 1-.708.708l-3-3a.5.5 0 0 1 0-.708l3-3a.5.5 0 1 1 .708.708L5.707 7.5H11.5a.5.5 0 0 1 .5.5" />
        </svg>


      </button>
      <button class="arrow-btn" id="next">
        <svg xmlns="http://www.w3.org/2000/svg" width="25" height="25" fill="#fff" class="bi bi-arrow-right-short"
          viewBox="0 0 16 16">
          <path fill-rule="evenodd"
            d="M4 8a.5.5 0 0 1 .5-.5h5.793L8.146 5.354a.5.5 0 1 1 .708-.708l3 3a.5.5 0 0 1 0 .708l-3 3a.5.5 0 0 1-.708-.708L10.293 8.5H4.5A.5.5 0 0 1 4 8" />
        </svg>


      </button>

    </div>

    <div class="indicators">

      <div class="numbers">01</div>

      <div class="dots">
        <div class="dot active"></div>
        <div class="dot"></div>
        <div class="dot"></div>
      </div>

    </div>

  </main>
</body>
<script src="./scripts.js"></script>

</html>
