<!doctype html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DevClub Store</title>
</head>

<body>
  <header>
    <div class="logo">Clannad</div>
    <nav>
      <ul>
        <li>home</li>
        <li>produtos</li>
        <li>contato</li>
      </ul>
    </nav>
  </header>

  <main class="container">
    <div class="tech-circle">
      <div class="circle"></div>
      <div class="circle"></div>
      <div class="circle"></div>
      <div class="circle"></div>
    </div>

    <div class="list">
      <div class="item active">


        <div class="product-img">
          <img src="../img/apple-watch.png" alt="Apple Watch">
        </div>
        <div class="content">
          <p class="product-tag">Novo lançamento</p>
          <p class="product-name">Apple Watch Series 10 </p>
          <p class="product-description">O smartwatch mais avançado do Mercado</p>
          <button class="btn">Saiba mais</button>

        </div>

      </div>
      <div class="item" </div>
        <div class="product-img">
          <img src="../img/air-pods.png" alt="Air pods">
        </div>
        <div class="content">
          <p class="product-tag">Novo lançamento</p>
          <p class="product-name">Apple Watch Series 10 </p>
          <p class="product-description">dasdasdasdasdasd </p>
          <button class="btn">Saiba mais</button>

        </div>
        <div class="item"></div>
        <div class="product-img">
          <img src="../img/vision-pro.png" alt="Vision Pro">
        </div>
        <div class="content">
          <p class="product-tag">Novo lançamento</p>
          <p class="product-name">Vision pro </p>
          <p class="product-description">O óculos mais tecnológico do mercadoo</p>
          <button class="btn">Saiba mais</button>

        </div>


      </div>
    </div>

    <div class="arrows">
      <button class="arrow-btn">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor"
          class="bi bi-arrow-left-short" viewBox="0 0 16 16">
          <path fill-rule="evenodd"
            d="M12 8a.5.5 0 0 1-.5.5H5.707l2.147 2.146a.5.5 0 0 1-.708.708l-3-3a.5.5 0 0 1 0-.708l3-3a.5.5 0 1 1 .708.708L5.707 7.5H11.5a.5.5 0 0 1 .5.5" />
        </svg>


      </button>
      <button class="arrow-btn">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor"
          class="bi bi-arrow-right-short" viewBox="0 0 16 16">
          <path fill-rule="evenodd"
            d="M4 8a.5.5 0 0 1 .5-.5h5.793L8.146 5.354a.5.5 0 1 1 .708-.708l3 3a.5.5 0 0 1 0 .708l-3 3a.5.5 0 0 1-.708-.708L10.293 8.5H4.5A.5.5 0 0 1 4 8" />
        </svg>


      </button>

    </div>

    <div class="indicators">

    </div>


  </main>
</body>

</html>
